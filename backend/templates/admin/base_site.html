{% extends "admin/base.html" %}
{% load static %}

{% block title %}{{ title }} | AyurWell Admin{% endblock %}

{% block branding %}
<h1 id="site-name">
  <a href="{% url 'admin:index' %}">🌿 AyurWell Admin</a>
</h1>
{% endblock %}

{% block extrastyle %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'admin/css/ayurwell_admin.css' %}" />
<style>
  /* Dashboard shortcut in nav */
  #nav-sidebar .module:first-child::before {
    content: "";
    display: block;
  }
</style>
{% endblock %}

{% block nav-global %}
<div style="background:rgba(255,255,255,.1);margin:8px;border-radius:8px;overflow:hidden;">
  <a href="/ayurwell-admin/dashboard/"
     style="display:block;padding:10px 16px;color:#B7E4C7;font-size:13px;font-weight:700;text-decoration:none;text-align:center;">
    📊 Analytics Dashboard
  </a>
</div>
<div style="margin:4px 8px 8px;">
  <a href="/api/docs/"
     style="display:block;padding:8px 16px;color:#B7E4C7;font-size:12px;text-decoration:none;text-align:center;border:1px solid rgba(255,255,255,.2);border-radius:6px;">
    📖 API Docs
  </a>
</div>
{% endblock %}
